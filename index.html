<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>window.__authRedirectHash = window.location.hash;</script>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#7A5C2E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Africa Safari">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Africa Safari 2026</title>
  <link rel="stylesheet" href="css/tokens.css?v=62">
  <link rel="stylesheet" href="css/print.css?v=62">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
  <!-- InstantDB real-time sync -->
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js?v=62"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Platform data layer + auth + trip switcher -->
  <script src="js/data-platform.js?v=62"></script>
  <script src="js/trip-switcher.js?v=62"></script>

  <style>
    /* ── Shell ─────────────────────────────────────────────────── */
    html{height:-webkit-fill-available}
    body{min-height:100vh;min-height:-webkit-fill-available;background:var(--surface)}
    #app{display:flex;flex-direction:column;height:100vh;height:100svh;max-width:480px;margin:0 auto;background:var(--bg);position:relative}

    /* ── Header ────────────────────────────────────────────────── */
    #app-header{flex-shrink:0;background:var(--surface);border-bottom:1.5px solid var(--border);padding:env(safe-area-inset-top) 0 0}
    .header-inner{display:flex;align-items:center;justify-content:space-between;padding:10px var(--s4) 12px}
    .header-sub{font-size:var(--text-xs);color:var(--text-muted)}
    .header-version{font-size:10px;color:var(--text-muted);font-family:monospace;opacity:.6;margin-top:1px}
    .header-title{font-size:var(--text-lg);font-weight:500;color:var(--text-primary)}
    .header-countdown{font-size:var(--text-xs);font-weight:500;background:var(--accent-subtle);color:var(--accent);border:1px solid var(--border);border-radius:var(--r-pill);padding:2px 8px;margin-top:4px;display:inline-block}
    .header-right{display:flex;align-items:center;gap:var(--s2)}
    #urgent-count{display:none;align-items:center;justify-content:center;background:var(--danger-text);color:#fff;border-radius:var(--r-pill);font-size:10px;font-weight:500;min-width:18px;height:18px;padding:0 5px}
    #sync-btn{display:flex;align-items:center;justify-content:center;background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--r-sm);width:32px;height:32px;color:var(--text-secondary);cursor:pointer}
    #sync-btn:hover{background:var(--accent-subtle);color:var(--accent)}

    /* ── No stamp banner (removed for Africa) ──────────────────── */
    #stamp-persistent{display:none!important}

    /* ── Conflict banner ───────────────────────────────────────── */
    .conflict-banner{background:var(--warning-bg);border-bottom:1.5px solid var(--warning-border);padding:var(--s2) var(--s4);display:none;align-items:center;justify-content:space-between;gap:var(--s3)}
    .conflict-msg{font-size:var(--text-xs);color:var(--warning-text);flex:1}
    .conflict-btns{display:flex;gap:var(--s2);flex-shrink:0}

    /* ── Screen ────────────────────────────────────────────────── */
    #screen-content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;min-height:0;padding:var(--s3) 0 calc(64px + env(safe-area-inset-bottom))}
    #screen-content.map-active{padding:0 0 calc(64px + env(safe-area-inset-bottom));display:flex;flex-direction:column}
    #map-container{flex:1;margin:var(--s2) var(--s3);border-radius:var(--r-lg);overflow:hidden;border:1.5px solid var(--border)}

    /* ── Bottom nav ────────────────────────────────────────────── */
    #app-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1.5px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:100}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px 6px;border:none;background:none;color:var(--text-muted);font-size:var(--text-xs);font-weight:400;cursor:pointer;min-height:var(--nav-h);position:relative;transition:color .15s;font-family:var(--font)}
    .nav-btn .icon{transition:color .15s}
    .nav-btn.active{color:var(--accent);font-weight:500}
    .nav-btn.active::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--accent);border-radius:0 0 var(--r-sm) var(--r-sm)}

    /* ── Timeline accordion ────────────────────────────────────── */
    .tl-day-header--tap{cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;gap:var(--s2);padding:12px var(--s3) 8px}
    .tl-day-meta{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
    .tl-day-date{font-size:var(--text-sm);font-weight:500;color:var(--text-primary)}
    .tl-day-title-text{font-size:var(--text-xs);color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tl-chevron{flex-shrink:0;color:var(--text-muted)}
    .tl-empty-hint{font-size:var(--text-xs);color:var(--text-muted);padding:4px var(--s3) 8px;font-style:italic}

    /* ── Timeline ──────────────────────────────────────────────── */
    .tl-day-block{padding:var(--s5) var(--s4) var(--s2);margin-top:var(--s1)}
    .tl-day-block:first-of-type{padding-top:var(--s3)}
    .tl-day-header-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
    .tl-day-pill{background:var(--accent);border-radius:var(--r-pill);padding:4px 12px;display:inline-flex;align-items:center;flex-shrink:0}
    .tl-day-label{font-size:var(--text-sm);font-weight:500;color:#fff;letter-spacing:.04em}
    .tl-day-date{font-size:16px;font-weight:500;color:var(--text-primary);line-height:1.2}
    .tl-day-title-text{font-size:var(--text-xs);color:var(--text-muted);margin-bottom:var(--s2);padding-left:2px}
    .tl-day-divider{height:1px;background:var(--border-subtle);margin:0 var(--s4) var(--s1)}

    /* Stop rows */
    .tl-row{display:flex;cursor:pointer;padding:0 var(--s4) 0 var(--s3)}
    .tl-row:active{background:rgba(0,0,0,.03)}
    .tl-time{width:44px;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;padding-top:14px;gap:1px}
    .tl-time-val{font-size:var(--text-xs);font-weight:500;color:var(--text-secondary)}
    .tl-time-tz{font-size:8px;color:var(--text-muted)}
    .tl-connector{width:32px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:10px}
    .tl-icon-circle{width:24px;height:24px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;background:var(--surface);flex-shrink:0}
    .tl-line{flex:1;width:2px;background:var(--border-subtle);margin:4px 0;min-height:16px}
    .tl-content{flex:1;padding:10px 0 14px var(--s2);min-width:0}
    .tl-name-row{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
    .tl-name{font-size:var(--text-sm);font-weight:500;color:var(--text-primary);line-height:1.3}
    .tl-activity{font-size:var(--text-xs);color:var(--text-secondary);margin-top:2px;line-height:1.4}
    .tl-hours{font-size:var(--text-xs);color:var(--text-muted);margin-top:2px}
    .tl-transport{display:flex;align-items:center;gap:4px;font-size:var(--text-xs);color:var(--text-muted);margin-top:4px}
    .tl-note{font-size:var(--text-xs);color:var(--accent);margin-top:4px;font-style:italic}
    .tl-footer{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:6px}
    .tl-link-chip{display:inline-block;font-size:10px;color:var(--accent);border:1px solid var(--border);border-radius:var(--r-sm);padding:2px 6px;text-decoration:none;margin-top:4px;margin-right:4px;background:var(--surface-raised)}

    /* Flight badges in stop rows */
    .tl-flight-badge{display:inline-flex;align-items:center;font-size:9px;font-weight:500;padding:2px 6px;border-radius:var(--r-pill);border:1px solid;white-space:nowrap}
    .tl-flight-badge--in{background:var(--flight-included-bg);color:var(--flight-included-text);border-color:var(--flight-included-border)}
    .tl-flight-badge--out{background:var(--flight-excluded-bg);color:var(--flight-excluded-text);border-color:var(--flight-excluded-border)}

    /* Category chips */
    .cat-chip{display:inline-flex;align-items:center;font-size:9px;font-weight:500;padding:2px 6px;border-radius:var(--r-pill);border:1px solid}
    .cat-chip--transport{background:var(--neutral-bg);color:var(--neutral-text);border-color:var(--neutral-border)}
    .cat-chip--activity{background:var(--accent-subtle);color:var(--accent);border-color:var(--border)}

    /* Overnight card */
    .overnight-card{margin:var(--s2) var(--s4);background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);cursor:pointer;transition:border-color .15s}
    .overnight-card:active{border-color:var(--accent)}
    .overnight-inner{display:flex;align-items:center;gap:var(--s3);padding:var(--s3)}
    .overnight-label{font-size:var(--text-xs);color:var(--text-muted)}
    .overnight-name{font-size:var(--text-sm);font-weight:500;color:var(--text-primary);margin-top:1px}
    .overnight-addr{font-size:var(--text-xs);color:var(--text-secondary);margin-top:2px}

    /* Add stop button */
    .add-stop-btn{display:flex;align-items:center;gap:var(--s2);padding:var(--s2) var(--s4);font-size:var(--text-xs);color:var(--text-muted);background:none;border:none;cursor:pointer;font-family:var(--font)}
    .add-stop-btn:hover{color:var(--accent)}

    /* Country divider between segments */
    .country-divider{display:flex;align-items:center;gap:var(--s3);padding:var(--s3) var(--s4) var(--s2);margin-top:var(--s2)}
    .country-divider-line{flex:1;height:1px;background:var(--border)}

    /* ── Inclusions/exclusions screen ──────────────────────────── */
    .inc-section{padding:var(--s3) var(--s4) 0}
    .inc-section-title{font-size:var(--text-xs);font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;padding:var(--s2) 0;border-bottom:1px solid var(--border-subtle);margin-bottom:var(--s2)}
    .inc-item{display:flex;align-items:flex-start;gap:var(--s2);padding:var(--s2) 0;border-bottom:1px solid var(--border-subtle)}
    .inc-item:last-child{border-bottom:none}
    .inc-item-dot{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:10px}
    .inc-item-dot--in{background:var(--success-bg);color:var(--success-text)}
    .inc-item-dot--out{background:var(--danger-bg);color:var(--danger-text)}
    .inc-item-text{font-size:var(--text-sm);color:var(--text-secondary);line-height:1.4}

    /* ── Bookings / stats ──────────────────────────────────────── */
    .stats-row{display:flex;gap:var(--s2);padding:var(--s3) var(--s4);overflow-x:auto;scrollbar-width:none}
    .stats-row::-webkit-scrollbar{display:none}
    .stat-card{flex-shrink:0;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:var(--s3) var(--s4);text-align:center;min-width:70px}
    .stat-num{font-size:20px;font-weight:500;color:var(--text-primary)}
    .stat-label{font-size:var(--text-xs);color:var(--text-muted);margin-top:2px}
    .booking-item{display:flex;align-items:center;gap:var(--s3);padding:var(--s3) var(--s4);border-bottom:1px solid var(--border-subtle);cursor:pointer}
    .booking-item:active{background:rgba(0,0,0,.02)}
    .booking-name{font-size:var(--text-sm);font-weight:500;color:var(--text-primary);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .booking-day{font-size:var(--text-xs);color:var(--text-muted);flex-shrink:0}

    /* ── Packing screen ────────────────────────────────────────── */
    .pack-section-header{font-size:var(--text-xs);font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;padding:var(--s3) var(--s4) var(--s1)}
    .pack-item{display:flex;align-items:center;gap:var(--s3);padding:10px var(--s4);border-bottom:1px solid var(--border-subtle);cursor:pointer}
    .pack-item:active{background:rgba(0,0,0,.02)}
    .pack-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent);flex-shrink:0;cursor:pointer}
    .pack-item-text{flex:1;font-size:var(--text-sm);color:var(--text-primary)}
    .pack-item-text--checked{text-decoration:line-through;color:var(--text-muted)}
    .pack-essential{font-size:9px;font-weight:500;color:var(--accent);background:var(--accent-subtle);border-radius:var(--r-pill);padding:1px 5px;flex-shrink:0}

    /* ── SOS / Kit ─────────────────────────────────────────────── */
    .sos-banner{display:flex;align-items:center;gap:var(--s3);padding:var(--s3) var(--s4);background:var(--danger-bg);border-bottom:1.5px solid var(--danger-border)}
    .sos-section{padding:var(--s3) var(--s4) 0}
    .sos-section-title{font-size:var(--text-xs);font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;padding:var(--s2) 0;border-bottom:1px solid var(--border-subtle);margin-bottom:var(--s2)}
    .sos-item{display:flex;align-items:center;gap:var(--s3);padding:var(--s3);margin-bottom:var(--s2)}
    .sos-country-chip{font-size:9px;font-weight:500;padding:2px 6px;border-radius:var(--r-pill);border:1px solid;white-space:nowrap;display:inline-block;margin-bottom:4px}

    /* Sub-tab bar (SOS tabs) */
    .sub-tab-bar{display:flex;justify-content:center;overflow-x:auto;scrollbar-width:none;border-bottom:1.5px solid var(--border);background:var(--surface);flex-shrink:0;padding:0 var(--s2)}
    .sub-tab-bar::-webkit-scrollbar{display:none}
    .sub-tab{flex:1 1 0;min-width:0;text-align:center;padding:10px 6px;font-size:var(--text-sm);font-weight:400;color:var(--text-muted);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1.5px;cursor:pointer;font-family:var(--font);transition:color .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sub-tab--active{color:var(--accent);font-weight:500;border-bottom-color:var(--accent)}

    /* Map legend */
    .map-legend{display:flex;gap:var(--s3);padding:var(--s2) var(--s4);overflow-x:auto;scrollbar-width:none;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border-subtle)}
    .map-legend::-webkit-scrollbar{display:none}
    .map-legend-item{display:flex;align-items:center;gap:5px;white-space:nowrap;font-size:var(--text-xs);color:var(--text-secondary);flex-shrink:0}
    .map-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

    /* Hospital cards */
    .kit-hosp-card{margin-bottom:var(--s2);padding:10px var(--s3);display:flex;flex-direction:column;gap:3px}
    .kit-hosp-region{font-size:var(--text-xs);color:var(--text-muted)}
    .kit-hosp-name{font-size:var(--text-sm);font-weight:500;color:var(--text-primary)}
    .kit-hosp-note{font-size:var(--text-xs);color:var(--text-secondary);font-style:italic}
    .kit-hosp-btns{display:flex;gap:var(--s2);margin-top:4px;align-self:flex-end}
    .kit-copy-btn{background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--r-sm);padding:3px 8px;font-size:var(--text-xs);color:var(--text-secondary);cursor:pointer;font-family:var(--font);text-decoration:none}
    .kit-maps-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);padding:3px 8px;font-size:var(--text-xs);cursor:pointer;font-family:var(--font);text-decoration:none}

    /* First aid accordion */
    .kit-fa-card{margin-bottom:var(--s2);overflow:hidden}
    .kit-fa-header{display:flex;align-items:center;justify-content:space-between;padding:12px var(--s3);cursor:pointer;user-select:none;-webkit-user-select:none}
    .kit-fa-title{font-size:var(--text-sm);font-weight:500;color:var(--text-primary)}
    .kit-fa-arrow{color:var(--text-muted);font-size:13px;transition:transform .2s;flex-shrink:0}
    .kit-fa-body{display:none;padding:0 var(--s3) 12px;font-size:var(--text-sm);color:var(--text-secondary);line-height:1.5}

    /* Link cards */
    .day-links-wrap{padding:var(--s2) var(--s4) var(--s3);display:flex;flex-wrap:wrap;align-items:center;gap:4px}
    .day-links-head{font-size:var(--text-xs);color:var(--text-muted);margin-right:4px}

    /* Settings / expense / travelers */
    .settings-section{margin-bottom:var(--s5)}
    .settings-section-title{font-size:var(--text-xs);font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;padding:var(--s3) 0 var(--s2);border-bottom:1px solid var(--border-subtle);margin-bottom:var(--s3)}
    .traveler-chip{display:inline-flex;align-items:center;gap:5px;background:var(--surface-raised);border:1.5px solid var(--border);border-radius:var(--r-pill);padding:4px 10px;font-size:var(--text-sm);color:var(--text-primary);font-weight:500}
    .traveler-chip--active{background:var(--accent);border-color:var(--accent);color:#fff}
    .traveler-chip-del{background:none;border:none;color:inherit;cursor:pointer;padding:0;font-size:14px;line-height:1;margin-left:2px;opacity:.7}
    .split-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
    .settlement-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:var(--s3);margin-bottom:var(--s3)}
    .settlement-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:var(--text-sm)}
    .settlement-owed{font-size:var(--text-base);font-weight:500;color:var(--danger-text)}
    .settlement-settled{font-size:var(--text-base);font-weight:500;color:var(--success-text)}
    .traveler-add-row{display:flex;gap:var(--s2);align-items:center;margin-top:var(--s3)}

    /* Inputs */
    input,select,textarea{font-size:16px !important;-webkit-text-size-adjust:100%;min-width:0;max-width:100%;box-sizing:border-box}
    input[type=time],input[type=date]{-webkit-appearance:none;appearance:none;width:100%}

    /* Weather strip */
    /* wx-rain defined in weather section below */

    /* Empty state */
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--s8) var(--s4);text-align:center;color:var(--text-muted);gap:var(--s3)}
    .empty-title{font-size:var(--text-md);font-weight:500;color:var(--text-secondary)}
    .empty-sub{font-size:var(--text-sm)}

    /* Map WC button (not used for Africa but kept for map.js compat) */
    .map-wc-btn{background:#fff;border:2px solid rgba(0,0,0,.2);border-radius:4px;width:34px;height:34px;font-size:10px;font-weight:700;letter-spacing:.04em;cursor:pointer;font-family:var(--font);color:#555;line-height:1;box-shadow:0 1px 5px rgba(0,0,0,.2);display:block;margin-top:5px}
    .map-wc-btn--active{border-color:#2563EB;background:#EFF6FF;color:#2563EB}

    /* ── Packing list ──────────────────────────────────────────── */
    .packing-header{display:flex;align-items:center;padding:var(--s3) var(--s4);gap:var(--s3);border-bottom:1px solid var(--border-subtle)}
    .packing-section{margin-bottom:var(--s2)}
    .packing-cat-header{display:flex;align-items:center;justify-content:space-between;padding:10px var(--s4) 4px;font-size:var(--text-xs);font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
    .packing-row{display:flex;align-items:center;gap:10px;padding:10px var(--s4);border-bottom:1px solid var(--border-subtle);cursor:pointer}
    .packing-row:active{background:rgba(0,0,0,.02)}
    .packing-row--done .packing-item{text-decoration:line-through;color:var(--text-muted)}
    .packing-item{flex:1;font-size:var(--text-sm);color:var(--text-primary);line-height:1.4}
    .packing-tag{font-size:9px;font-weight:500;color:var(--accent);background:var(--accent-subtle);border-radius:var(--r-pill);padding:2px 6px;flex-shrink:0;white-space:nowrap}
    .packing-del{background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:0 2px;flex-shrink:0;line-height:1;font-family:var(--font)}
    .packing-del:hover{color:var(--danger-text)}
    .packing-add-row{display:flex;gap:var(--s2);padding:8px var(--s4)}
    .packing-add-input{flex:1;border:1.5px solid var(--border);border-radius:var(--r-md);padding:6px 10px;font-size:var(--text-sm);background:var(--surface);color:var(--text-primary);font-family:var(--font)}
    .packing-add-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--r-md);padding:6px 14px;font-size:var(--text-sm);font-weight:500;cursor:pointer;font-family:var(--font);flex-shrink:0}

    /* ── Budget screen ─────────────────────────────────────────── */
    .budget-total-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:var(--s4);margin:var(--s3) var(--s4)}
    .budget-bar{height:6px;background:var(--border);border-radius:var(--r-pill);overflow:hidden;margin:var(--s2) 0}
    .budget-fill{height:100%;border-radius:var(--r-pill);background:var(--accent);transition:width .3s}
    .expense-day-header{display:flex;align-items:center;justify-content:space-between;padding:8px var(--s4);font-size:var(--text-xs);font-weight:500;color:var(--text-muted);border-top:1px solid var(--border-subtle);margin-top:var(--s2)}
    .expense-row{display:flex;align-items:center;gap:var(--s3);padding:10px var(--s4);border-bottom:1px solid var(--border-subtle)}
    .expense-desc{flex:1;font-size:var(--text-sm);color:var(--text-primary)}
    .expense-split-line{font-size:var(--text-xs);color:var(--text-muted);margin-top:2px}
    .expense-amt{font-size:var(--text-sm);font-weight:500;color:var(--text-primary);flex-shrink:0}
    .expense-per{font-size:var(--text-xs);color:var(--text-muted);text-align:right;flex-shrink:0}
    .expense-del{background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:0;line-height:1;flex-shrink:0}
    .add-expense-form{display:flex;flex-wrap:wrap;gap:var(--s2);padding:var(--s3) var(--s4);background:var(--surface-raised);border-bottom:1.5px solid var(--border);align-items:center}

    /* ── Weather strip ─────────────────────────────────────────── */
    .wx-strip{margin:var(--s2) var(--s4) 0;background:var(--surface-raised);border-radius:8px;overflow:hidden}
    .wx-location{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;padding:5px 10px 3px;border-bottom:1px solid var(--border-subtle)}
    .wx-days-row{display:grid;grid-template-columns:repeat(3,1fr)}
    .wx-day{display:flex;align-items:center;gap:5px;padding:6px 10px}
    .wx-icon{font-size:16px;line-height:1;flex-shrink:0}
    .wx-text{display:flex;flex-direction:column;gap:0}
    .wx-date{font-size:9px;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:.04em;line-height:1.2}
    .wx-temp{font-size:11px;color:var(--text-primary);font-weight:500;line-height:1.3;white-space:nowrap}
    .wx-temp-min{color:var(--text-muted);font-weight:400}
    .wx-rain{font-size:9.5px;color:var(--text-muted);line-height:1.2;white-space:nowrap}
    .wx-rain--wet{color:#b86e1a;font-weight:500}

    /* ── CSS vars missing from Africa (were in Japan tokens.css) ── */
    :root {
      --stamp-border: var(--border);
      --stamp-bg:     var(--accent-subtle);
    }

    /* ── Bottom sheet ──────────────────────────────────────────── */
    .bs-detail{padding:var(--s4)}
    .bs-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:var(--s3)}
    .bs-name{font-size:var(--text-lg);font-weight:500;color:var(--text-primary);margin-bottom:4px}
    .bs-activity{font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:var(--s3);line-height:1.4}
    .bs-rows{display:flex;flex-direction:column;gap:10px;padding:var(--s3) 0;border-top:1px solid var(--border-subtle);border-bottom:1px solid var(--border-subtle);margin-bottom:var(--s3)}
    .bs-row{display:flex;align-items:flex-start;gap:10px;font-size:var(--text-sm);color:var(--text-primary)}
    .bs-row .icon{width:16px;height:16px;flex-shrink:0;margin-top:2px;color:var(--text-muted)}
    .bs-transport-card{background:var(--accent-subtle);border:1px solid var(--border);border-radius:var(--r-md);padding:var(--s3);margin-bottom:var(--s3)}
    .bs-transport-card-title{font-size:var(--text-xs);font-weight:500;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:var(--s2)}
    .bs-transport-row{display:flex;align-items:flex-start;gap:8px;font-size:var(--text-sm);color:var(--text-primary);margin-bottom:6px}
    .bs-transport-row:last-child{margin-bottom:0}
    .bs-transport-row .icon{width:16px;height:16px;color:var(--accent);flex-shrink:0;margin-top:2px}
    .bs-actions{display:flex;flex-direction:column;gap:var(--s2)}
    .bs-full-btn{width:100%;justify-content:center}
    .bs-action-row{display:flex;gap:var(--s2)}
    .bs-action-row .btn{flex:1;justify-content:center;font-size:var(--text-sm)}
    .bs-edit-group{margin-bottom:var(--s3);width:100%;min-width:0}
    .bs-edit-label{display:block;font-size:var(--text-xs);font-weight:500;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
    .bs-input{width:100%;background:var(--surface-raised);border:1.5px solid var(--border);border-radius:var(--r-md);padding:8px 10px;font-size:var(--text-sm);font-family:var(--font);color:var(--text-primary);min-height:40px;box-sizing:border-box}
    .bs-time-row{display:flex;gap:6px;align-items:center}
    .bs-tz-sel{width:74px!important;flex-shrink:0!important;padding-right:2px!important}
    .bs-input:focus{outline:none;border-color:var(--accent);background:var(--surface)}
    .bs-textarea{width:100%;background:var(--surface-raised);border:1.5px solid var(--border);border-radius:var(--r-md);padding:8px 10px;font-size:var(--text-sm);font-family:var(--font);color:var(--text-primary);resize:vertical;box-sizing:border-box}
    .bs-textarea:focus{outline:none;border-color:var(--accent)}
    .bs-section-head{font-size:var(--text-xs);font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin:var(--s4) 0 var(--s2);padding-bottom:var(--s1);border-bottom:1px solid var(--border-subtle)}
    .bs-train-detail-block{background:var(--accent-subtle);border:1px solid var(--border);border-radius:var(--r-md);padding:var(--s3);margin-top:var(--s2)}
    .bs-autodur{font-size:var(--text-xs);color:var(--text-muted);margin-top:4px}
  </style>
</head>
<body>
<div id="app">
  <header id="app-header">
    <div class="header-inner">
      <div style="display:flex;align-items:center;gap:8px">
        <button id="header-switch-icon" aria-label="Switch trips" style="width:28px;height:28px;border-radius:9px;background:var(--accent-subtle);color:var(--accent);border:none;font-size:13px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center">☰</button>
        <div>
          <span class="header-sub">31 Aug – 17 Sep · Tanzania · Kenya · Uganda</span>
          <p class="header-title" id="header-trip-name"><span id="header-trip-name-text">Africa Safari 2026</span> <span style="font-size:12px;color:var(--accent)">▾</span></p>
          <p class="header-version" id="app-version-display"></p>
          <span class="header-countdown" id="countdown"></span>
        </div>
      </div>
      <div class="header-right">
        <span id="urgent-count"></span>
        <span id="sync-badge" class="badge badge-open">Offline</span>
        <button id="sync-btn" aria-label="Sync"></button>
      </div>
    </div>
  </header>

  <!-- Stamp banner hidden for Africa (no stamps) -->
  <div id="stamp-persistent" style="display:none"></div>

  <main id="screen-content"></main>

  <nav id="app-nav">
    <button class="nav-btn active" data-screen="itinerary" aria-label="Itinerary"></button>
    <button class="nav-btn" data-screen="map"              aria-label="Map"></button>
    <button class="nav-btn" data-screen="dex"               aria-label="Dex"></button>
    <button class="nav-btn" data-screen="bookings"         aria-label="Bookings"></button>
    <button class="nav-btn" data-screen="sos"              aria-label="Kit"></button>
  </nav>
</div>

<script src="js/auth.js?v=62"></script>
<script src="js/config.js?v=62"></script>
<script src="js/db.js?v=62"></script>
<script src="js/icons.js?v=62"></script>
<script src="js/toast.js?v=62"></script>
<script src="js/bottom-sheet.js?v=62"></script>
<script src="js/weather.js?v=62"></script>
<script src="js/screens/itinerary.js?v=62"></script>
<script src="js/screens/map.js?v=62"></script>
<script src="js/screens/dex.js?v=62"></script>
<script src="js/screens/bookings.js?v=62"></script>
<script src="js/screens/sos.js?v=62"></script>
<script src="js/screens/landing.js?v=62"></script>
<script src="js/app.js?v=62"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const navCfg = [
    {screen:'itinerary', icon:'calendar', label:'Itinerary'},
    {screen:'map',       icon:'map',      label:'Map'},
    {screen:'dex',       icon:'star',     label:'Dex'},
    {screen:'bookings',  icon:'bookmark', label:'Bookings'},
    {screen:'sos',       icon:'kit',      label:'Kit'},
  ];
  document.querySelectorAll('.nav-btn').forEach((btn, i) => {
    const {icon, label} = navCfg[i];
    btn.innerHTML = `${Icons[icon]('icon-lg')}<span>${label}</span>`;
  });
  document.getElementById('sync-btn').innerHTML = Icons.refresh('icon-sm');

  // Gate the app behind a PIN before initialising
  Auth.gate().then(() => App.init());
});
</script>
</body>
</html>
