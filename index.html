<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#7A5C2E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Africa Safari">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Africa Safari 2026</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/print.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
  <!-- InstantDB real-time sync -->
  <!-- 1. Supabase (creates window.supabase) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- 2. Config (defines Config object) -->
  <script src="js/config.js"></script>
  <!-- 3. Supabase client init (needs window.supabase + Config) -->
  <script src="js/supabase.js"></script>
  <!-- 4. Core utilities -->
  <script src="js/db.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/bottom-sheet.js"></script>
  <script src="js/weather.js"></script>
  <!-- 5. Leaflet maps -->
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- 6. Platform data + auth (needs Config, DB, SB) -->
  <script src="js/data-platform.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/trip-switcher.js"></script>
  <!-- 7. Screen modules -->
  <script src="js/screens/itinerary.js"></script>
  <script src="js/screens/map.js"></script>
  <script src="js/screens/dex.js"></script>
  <script src="js/screens/bookings.js"></script>
  <script src="js/screens/sos.js"></script>
  <!-- 8. App bootstrap (must be last) -->
  <script src="js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const navCfg = [
    {screen:'itinerary', icon:'calendar', label:'Itinerary'},
    {screen:'map',       icon:'map',      label:'Map'},
    {screen:'dex',       icon:'star',     label:'Dex'},
    {screen:'bookings',  icon:'bookmark', label:'Bookings'},
    {screen:'sos',       icon:'kit',      label:'Kit'},
  ];
  document.querySelectorAll('.nav-btn').forEach((btn, i) => {
    const {icon, label} = navCfg[i];
    btn.innerHTML = `${Icons[icon]('icon-lg')}<span>${label}</span>`;
  });
  document.getElementById('sync-btn').innerHTML = Icons.refresh('icon-sm');

  // Gate the app behind a PIN before initialising
  Auth.gate().then(() => App.init());
});
</script>
</body>
</html>
